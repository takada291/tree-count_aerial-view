<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>樹頂点AI検知アプリ</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="樹頂点検知">
    <link rel="apple-touch-icon" href="icon-512.png">

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        body { font-family: -apple-system, sans-serif; padding: 10px; background: #e8f5e9; color: #333; margin: 0; padding-bottom: 40px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .header-area { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #2e7d32; margin-bottom: 10px; padding-bottom: 5px; }
        h2 { margin: 0; font-size: 1.1em; color: #1b5e20; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 6px; font-weight: bold; font-size: 0.95rem; cursor: pointer; text-align: center; width: 100%; margin-bottom: 10px; box-sizing: border-box;}
        .btn-primary { background: #1565c0; color: white; }
        .btn-success { background: #2e7d32; color: white; }
        .btn-warning { background: #f57f17; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn:disabled { background: #bdbdbd; cursor: not-allowed; }

        .controls { display: flex; gap: 10px; margin-bottom: 10px; }
        .controls .btn { margin-bottom: 0; }

        #canvas-container { position: relative; width: 100%; background: #000; border-radius: 8px; overflow: hidden; display: flex; justify-content: center; align-items: center; min-height: 250px;}
        /* 高さが広がりすぎないよう制限 */
        canvas { max-width: 100%; max-height: 75vh; height: auto; touch-action: none; display: block; }

        .summary-box { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; background: #f1f8e9; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 1.1em; color: #1b5e20; }
        .stat { display: flex; justify-content: space-between; padding: 5px 10px; background: white; border-radius: 6px; border: 1px solid #c5e1a5;}
        .stat-s { color: #2e7d32; }
        .stat-r { color: #c62828; }
        .stat-w { color: #616161; }
        .stat-total { color: #1565c0; grid-column: span 2; }
        
        .mode-text { font-size: 0.85em; color: #d32f2f; margin-bottom: 10px; font-weight: bold; text-align: center;}

        /* PCレイアウト用のCSS（画面幅900px以上で左右2カラムに） */
        .main-layout { display: flex; flex-direction: column; gap: 15px; }
        @media (min-width: 900px) {
            .main-layout { flex-direction: row; align-items: flex-start; }
            .left-panel { flex: 1; min-width: 0; }
            .right-panel { flex: 0 0 350px; display: flex; flex-direction: column; gap: 15px; }
            .right-panel .card { margin-bottom: 0; }
            #canvas-container { min-height: 500px; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header-area">
        <h2>🌲 樹頂点 AI検知アプリ V4.2 (Cloud API)</h2>
    </div>
    <div id="statusMsg" style="font-size:0.9em; margin-bottom: 5px; color: #1565c0; font-weight: bold;">写真を選択・撮影して検知ボタンを押してください</div>
</div>

<div class="main-layout">
    <div class="left-panel">
        <div class="card" style="margin-bottom:0; height:100%; display:flex; flex-direction:column;">
            <div id="modeMessage" class="mode-text" style="display:none;">画像をタップして頂点を追加し、始点をタップして囲みを閉じます</div>
            <div id="canvas-container" style="flex-grow:1;">
                <canvas id="viewCanvas"></canvas>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="card">
            <label class="btn btn-secondary" style="display:block;">
                📸 写真を選択 / 撮影
                <input type="file" id="imageInput" accept="image/*,capture=camera" style="display:none;" onchange="loadImage(event)">
            </label>
            <button id="btnDetect" class="btn btn-success" onclick="runDetection()" disabled>🚀 クラウドAI検知スタート</button>
        </div>

        <div class="card">
            <div class="controls">
                <button id="btnMode" class="btn btn-warning" onclick="toggleMode()">⬡ 多角形モード: OFF</button>
                <button class="btn btn-secondary" onclick="resetSelection()">🔄 範囲リセット</button>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top:0; font-size: 1rem; color:#1b5e20;">📊 検知結果</h3>
            <div class="summary-box">
                <div class="stat stat-s"><span>スギ (s):</span> <span id="countS">0</span></div>
                <div class="stat stat-r"><span>赤枯 (r):</span> <span id="countR">0</span></div>
                <div class="stat stat-w"><span>枯死 (w):</span> <span id="countW">0</span></div>
                <div class="stat stat-total"><span>合計:</span> <span id="countTotal">0</span></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // API設定
    // ==========================================
    const PROJECT_NAME = "treetopcount"; 
    const API_KEY = "WgeEKIqfSAI1zfDZcRyS"; 
    const MODEL_VERSION = 3;
    // ==========================================

    let imgElement = new Image();
    let predictionsData = [];
    
    const canvas = document.getElementById('viewCanvas');
    const ctx = canvas.getContext('2d');
    
    const btnDetect = document.getElementById('btnDetect');
    const btnMode = document.getElementById('btnMode');
    const statusMsg = document.getElementById('statusMsg');
    
    let isSelectionMode = false;
    let polygonPoints = [];
    let mousePos = null;
    let isPolygonClosed = false;

    function loadImage(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            imgElement.onload = function() {
                canvas.width = imgElement.width;
                canvas.height = imgElement.height;
                ctx.drawImage(imgElement, 0, 0);
                predictionsData = [];
                resetSelection();
                updateCounts();
                btnDetect.disabled = false;
                
                statusMsg.innerText = "写真を選択・撮影して検知ボタンを押してください";
                statusMsg.style.color = "#2e7d32";
            }
            imgElement.src = e.target.result;
        }
        reader.readAsDataURL(file);
    }

    async function runDetection() {
        if(!imgElement.src) return;
        btnDetect.innerText = "⏳ クラウドで推論中...";
        btnDetect.disabled = true;
        
        try {
            const tmpCanvas = document.createElement('canvas');
            tmpCanvas.width = imgElement.width;
            tmpCanvas.height = imgElement.height;
            const tmpCtx = tmpCanvas.getContext('2d');
            tmpCtx.drawImage(imgElement, 0, 0);

            const blob = await new Promise(resolve => tmpCanvas.toBlob(resolve, 'image/jpeg', 0.8));

            const formData = new FormData();
            formData.append("file", blob, "image.jpg");

            const url = `https://detect.roboflow.com/${PROJECT_NAME}/${MODEL_VERSION}?api_key=${API_KEY}`;
            
            const response = await fetch(url, {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errText}`);
            }

            const data = await response.json();
            predictionsData = data.predictions || [];
            
            drawCanvas();
            updateCounts();
            
            btnDetect.innerText = "✅ 検知完了 (再実行)";
        } catch(e) {
            alert("検知エラー: 通信が弾かれました。\n" + e.message);
            btnDetect.innerText = "🚀 クラウドAI検知スタート";
            console.error(e);
        }
        btnDetect.disabled = false;
    }

    function drawCanvas() {
        if(!imgElement.src) return;
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(imgElement, 0, 0);
        
        predictionsData.forEach(p => {
            const boxColor = getColorForClass(p.class);
            const cx = p.x;
            const cy = p.y;
            const w = p.width;
            const h = p.height;
            const x = cx - w / 2;
            const y = cy - h / 2;
            
            let alpha = 1.0;
            if (isPolygonClosed && polygonPoints.length >= 3) {
                if (!isInsidePolygon(cx, cy, polygonPoints)) {
                    alpha = 0.2;
                }
            }

            ctx.globalAlpha = alpha;
            ctx.strokeStyle = boxColor;
            ctx.lineWidth = Math.max(2, canvas.width / 500);
            ctx.strokeRect(x, y, w, h);
            
            ctx.fillStyle = boxColor;
            const fontSize = Math.max(12, canvas.width / 60);
            ctx.font = `bold ${fontSize}px Arial`;
            
            const text = `${p.class} ${Math.round(p.confidence*100)}%`;
            const textWidth = ctx.measureText(text).width;
            ctx.fillRect(x, y - fontSize - 4, textWidth + 4, fontSize + 4);
            ctx.fillStyle = '#FFFFFF';
            ctx.fillText(text, x + 2, y - 4);
        });
        
        ctx.globalAlpha = 1.0;

        // 多角形の描画
        if (polygonPoints.length > 0) {
            ctx.strokeStyle = '#f57f17';
            ctx.lineWidth = Math.max(3, canvas.width / 300);
            
            ctx.beginPath();
            ctx.moveTo(polygonPoints[0].x, polygonPoints[0].y);
            for(let i = 1; i < polygonPoints.length; i++) {
                ctx.lineTo(polygonPoints[i].x, polygonPoints[i].y);
            }
            
            if (isPolygonClosed) {
                ctx.closePath();
                ctx.fillStyle = 'rgba(245, 127, 23, 0.2)';
                ctx.fill();
            } else if (mousePos) {
                ctx.lineTo(mousePos.x, mousePos.y); // マウス追従線
            }
            
            ctx.setLineDash([10, 10]);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // 頂点の目印を描画（始点だけ少し大きく）
            polygonPoints.forEach((pt, index) => {
                ctx.beginPath();
                const radius = (index === 0 && !isPolygonClosed) ? Math.max(8, canvas.width/200) : Math.max(4, canvas.width/400);
                ctx.arc(pt.x, pt.y, radius, 0, 2*Math.PI);
                ctx.fillStyle = (index === 0 && !isPolygonClosed) ? 'rgba(245, 127, 23, 0.8)' : '#f57f17';
                ctx.fill();
            });
        }
    }

    function getColorForClass(className) {
        if (className === 's') return '#2e7d32'; 
        if (className === 'r') return '#c62828'; 
        if (className === 'w') return '#616161'; 
        return '#1565c0'; 
    }

    function updateCounts() {
        let countS = 0, countR = 0, countW = 0;
        
        predictionsData.forEach(p => {
            const cx = p.x;
            const cy = p.y;
            
            // 多角形が閉じられている場合のみフィルタリング
            if (isPolygonClosed && polygonPoints.length >= 3) {
                if (!isInsidePolygon(cx, cy, polygonPoints)) return;
            }
            
            if (p.class === 's') countS++;
            else if (p.class === 'r') countR++;
            else if (p.class === 'w') countW++;
        });

        document.getElementById('countS').innerText = countS;
        document.getElementById('countR').innerText = countR;
        document.getElementById('countW').innerText = countW;
        document.getElementById('countTotal').innerText = countS + countR + countW;
    }

    function toggleMode() {
        isSelectionMode = !isSelectionMode;
        if (isSelectionMode) {
            btnMode.innerText = "⬡ 多角形モード: ON";
            btnMode.classList.remove('btn-warning');
            btnMode.classList.add('btn-primary');
            document.getElementById('modeMessage').style.display = 'block';
        } else {
            btnMode.innerText = "⬜ 多角形モード: OFF";
            btnMode.classList.add('btn-warning');
            btnMode.classList.remove('btn-primary');
            document.getElementById('modeMessage').style.display = 'none';
        }
    }

    function resetSelection() {
        polygonPoints = [];
        isPolygonClosed = false;
        mousePos = null;
        drawCanvas();
        updateCounts();
    }

    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        let clientX = e.clientX;
        let clientY = e.clientY;
        
        if(e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        }

        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }

    // 多角形の内外判定アルゴリズム (Ray-casting)
    function isInsidePolygon(x, y, points) {
        let isInside = false;
        for (let i = 0, j = points.length - 1; i < points.length; j = i++) {
            let xi = points[i].x, yi = points[i].y;
            let xj = points[j].x, yj = points[j].y;
            let intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
            if (intersect) isInside = !isInside;
        }
        return isInside;
    }

    // クリック（タップ）での多角形描画処理
    canvas.addEventListener('click', (e) => {
        if (!isSelectionMode || !imgElement.src) return;
        
        const pt = getMousePos(e);
        
        if (isPolygonClosed) {
            // 既に閉じている場合はリセットして新しく始める
            polygonPoints = [pt];
            isPolygonClosed = false;
        } else {
            // 3点以上打たれていて、始点近くをクリックしたら閉じる
            if (polygonPoints.length >= 3) {
                const dx = pt.x - polygonPoints[0].x;
                const dy = pt.y - polygonPoints[0].y;
                // スマホやPCの描画スケールに合わせて判定範囲を調整
                const hitRadius = 30 * (canvas.width / canvas.getBoundingClientRect().width); 
                
                if (Math.sqrt(dx*dx + dy*dy) < hitRadius) {
                    isPolygonClosed = true;
                    drawCanvas();
                    updateCounts();
                    return;
                }
            }
            polygonPoints.push(pt);
        }
        drawCanvas();
    });

    // マウスカーソルへの追従線（PC向け）
    canvas.addEventListener('mousemove', (e) => {
        if (!isSelectionMode || isPolygonClosed || polygonPoints.length === 0) return;
        mousePos = getMousePos(e);
        drawCanvas();
    });

    window.addEventListener('load', () => {
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister(); 
                }
            });
        }
    });
</script>
</body>
</html>
