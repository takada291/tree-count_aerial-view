<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>樹頂点AI検知アプリ</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="樹頂点検知">
    <link rel="apple-touch-icon" href="icon-512.png">

    <style>
        body { font-family: -apple-system, sans-serif; padding: 10px; background: #e8f5e9; color: #333; margin: 0; padding-bottom: 40px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .header-area { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #2e7d32; margin-bottom: 10px; padding-bottom: 5px; }
        h2 { margin: 0; font-size: 1.1em; color: #1b5e20; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 6px; font-weight: bold; font-size: 0.95rem; cursor: pointer; text-align: center; width: 100%; margin-bottom: 10px; box-sizing: border-box;}
        .btn-primary { background: #1565c0; color: white; }
        .btn-success { background: #2e7d32; color: white; }
        .btn-warning { background: #f57f17; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        
        .btn:disabled { background: #bdbdbd; cursor: not-allowed; }

        .controls { display: flex; gap: 10px; margin-bottom: 10px; }
        .controls .btn { margin-bottom: 0; }

        #canvas-container { position: relative; width: 100%; background: #000; border-radius: 8px; overflow: hidden; display: flex; justify-content: center; align-items: center; min-height: 250px; margin-bottom: 10px;}
        canvas { max-width: 100%; height: auto; touch-action: none; }

        .summary-box { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; background: #f1f8e9; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 1.1em; color: #1b5e20; }
        .stat { display: flex; justify-content: space-between; padding: 5px 10px; background: white; border-radius: 6px; border: 1px solid #c5e1a5;}
        .stat-s { color: #2e7d32; }
        .stat-r { color: #c62828; }
        .stat-w { color: #616161; }
        .stat-total { color: #1565c0; grid-column: span 2; }
        
        .mode-text { font-size: 0.85em; color: #d32f2f; margin-bottom: 5px; font-weight: bold; text-align: center;}
    </style>
</head>
<body>

<div class="card">
    <div class="header-area">
        <h2>🌲 樹頂点 AI検知アプリ V3.0 (Cloud)</h2>
    </div>

    <div id="statusMsg" style="font-size:0.9em; margin-bottom: 10px; color: #1565c0; font-weight: bold;">1. 写真を選択または撮影してください</div>

    <label class="btn btn-secondary" style="display:block;">
        📸 写真を選択 / 撮影
        <input type="file" id="imageInput" accept="image/*,capture=camera" style="display:none;" onchange="loadImage(event)">
    </label>

    <button id="btnDetect" class="btn btn-success" onclick="runDetection()" disabled>🚀 クラウドAI検知スタート</button>
</div>

<div class="card">
    <div class="controls">
        <button id="btnMode" class="btn btn-warning" onclick="toggleMode()">⬜ 範囲選択モード: OFF</button>
        <button class="btn btn-secondary" onclick="resetSelection()">🔄 範囲リセット</button>
    </div>
    <div id="modeMessage" class="mode-text" style="display:none;">画像をドラッグしてカウント範囲を指定してください</div>

    <div id="canvas-container">
        <canvas id="viewCanvas"></canvas>
    </div>
</div>

<div class="card">
    <h3 style="margin-top:0; font-size: 1rem; color:#1b5e20;">📊 検知結果</h3>
    <div class="summary-box">
        <div class="stat stat-s"><span>スギ (s):</span> <span id="countS">0</span></div>
        <div class="stat stat-r"><span>赤枯 (r):</span> <span id="countR">0</span></div>
        <div class="stat stat-w"><span>枯死 (w):</span> <span id="countW">0</span></div>
        <div class="stat stat-total"><span>合計:</span> <span id="countTotal">0</span></div>
    </div>
</div>

<script>
    // ==========================================
    // API設定 (Cloud REST API用)
    // ==========================================
    const PROJECT_NAME = "treetopcount";
    const API_KEY = "rf_sRyNyDbysrbVYyp2FNCslDCxdpN2";
    const MODEL_VERSION = 2;
    // ==========================================

    let imgElement = new Image();
    let predictionsData = [];
    
    const canvas = document.getElementById('viewCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const btnDetect = document.getElementById('btnDetect');
    const btnMode = document.getElementById('btnMode');
    const statusMsg = document.getElementById('statusMsg');
    
    let isSelectionMode = false;
    let isDrawing = false;
    let selectionRect = null; // {x, y, w, h}
    let startPos = {x:0, y:0};

    // --- 画像読み込み ---
    function loadImage(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            imgElement.onload = function() {
                canvas.width = imgElement.width;
                canvas.height = imgElement.height;
                ctx.drawImage(imgElement, 0, 0);
                predictionsData = [];
                selectionRect = null;
                updateCounts();
                btnDetect.disabled = false;
                statusMsg.innerText = "2. AI検知スタートを押してください";
                statusMsg.style.color = "#2e7d32";
            }
            imgElement.src = e.target.result;
        }
        reader.readAsDataURL(file);
    }

    // --- クラウドAI検知 (REST API) ---
    async function runDetection() {
        if(!imgElement.src) return;
        btnDetect.innerText = "⏳ クラウドで推論中...";
        btnDetect.disabled = true;
        
        try {
            // 画像をBase64テキストに変換
            const tmpCanvas = document.createElement('canvas');
            tmpCanvas.width = imgElement.width;
            tmpCanvas.height = imgElement.height;
            const tmpCtx = tmpCanvas.getContext('2d');
            tmpCtx.drawImage(imgElement, 0, 0);
            // JPEG品質0.8で圧縮して送信（通信量を抑える）
            const dataURL = tmpCanvas.toDataURL('image/jpeg', 0.8);
            const base64Image = dataURL.split(',')[1]; 

            // Roboflowサーバーへ直接POST送信
            const url = `https://detect.roboflow.com/${PROJECT_NAME}/${MODEL_VERSION}?api_key=${API_KEY}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: base64Image
            });

            if (!response.ok) {
                throw new Error(`サーバーエラー: ${response.status}`);
            }

            const data = await response.json();
            predictionsData = data.predictions || [];
            
            selectionRect = null;
            drawCanvas();
            updateCounts();
            
            btnDetect.innerText = "✅ 検知完了 (再実行)";
        } catch(e) {
            alert("検知エラー: 通信環境を確認してください。\n" + e.message);
            btnDetect.innerText = "🚀 クラウドAI検知スタート";
            console.error(e);
        }
        btnDetect.disabled = false;
    }

    // --- 描画処理 ---
    function drawCanvas() {
        if(!imgElement.src) return;
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(imgElement, 0, 0);
        
        predictionsData.forEach(p => {
            const boxColor = getColorForClass(p.class);
            // REST APIの返り値は x, y が中心座標
            const cx = p.x;
            const cy = p.y;
            const w = p.width;
            const h = p.height;
            const x = cx - w / 2;
            const y = cy - h / 2;
            
            let alpha = 1.0;
            if (selectionRect) {
                if (!isInsideRect(cx, cy, selectionRect)) {
                    alpha = 0.2;
                }
            }

            ctx.globalAlpha = alpha;
            ctx.strokeStyle = boxColor;
            ctx.lineWidth = Math.max(2, canvas.width / 500);
            ctx.strokeRect(x, y, w, h);
            
            ctx.fillStyle = boxColor;
            const fontSize = Math.max(12, canvas.width / 60);
            ctx.font = `bold ${fontSize}px Arial`;
            
            const text = `${p.class} ${Math.round(p.confidence*100)}%`;
            const textWidth = ctx.measureText(text).width;
            ctx.fillRect(x, y - fontSize - 4, textWidth + 4, fontSize + 4);
            ctx.fillStyle = '#FFFFFF';
            ctx.fillText(text, x + 2, y - 4);
        });
        
        ctx.globalAlpha = 1.0;

        if (selectionRect) {
            ctx.strokeStyle = '#f57f17';
            ctx.lineWidth = Math.max(3, canvas.width / 300);
            ctx.setLineDash([10, 10]);
            ctx.strokeRect(selectionRect.x, selectionRect.y, selectionRect.w, selectionRect.h);
            ctx.setLineDash([]);
            
            ctx.fillStyle = 'rgba(245, 127, 23, 0.2)';
            ctx.fillRect(selectionRect.x, selectionRect.y, selectionRect.w, selectionRect.h);
        }
    }

    function getColorForClass(className) {
        if (className === 's') return '#2e7d32'; 
        if (className === 'r') return '#c62828'; 
        if (className === 'w') return '#616161'; 
        return '#1565c0'; 
    }

    function updateCounts() {
        let countS = 0, countR = 0, countW = 0;
        
        predictionsData.forEach(p => {
            const cx = p.x;
            const cy = p.y;
            
            if (selectionRect && !isInsideRect(cx, cy, selectionRect)) return;
            
            if (p.class === 's') countS++;
            else if (p.class === 'r') countR++;
            else if (p.class === 'w') countW++;
        });

        document.getElementById('countS').innerText = countS;
        document.getElementById('countR').innerText = countR;
        document.getElementById('countW').innerText = countW;
        document.getElementById('countTotal').innerText = countS + countR + countW;
    }

    function toggleMode() {
        isSelectionMode = !isSelectionMode;
        if (isSelectionMode) {
            btnMode.innerText = "🟨 範囲選択モード: ON";
            btnMode.classList.remove('btn-warning');
            btnMode.classList.add('btn-primary');
            document.getElementById('modeMessage').style.display = 'block';
        } else {
            btnMode.innerText = "⬜ 範囲選択モード: OFF";
            btnMode.classList.add('btn-warning');
            btnMode.classList.remove('btn-primary');
            document.getElementById('modeMessage').style.display = 'none';
        }
    }

    function resetSelection() {
        selectionRect = null;
        drawCanvas();
        updateCounts();
    }

    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        let clientX = e.clientX;
        let clientY = e.clientY;
        
        if(e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        }

        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }

    function isInsideRect(x, y, rect) {
        const rx = Math.min(rect.x, rect.x + rect.w);
        const ry = Math.min(rect.y, rect.y + rect.h);
        const rw = Math.abs(rect.w);
        const rh = Math.abs(rect.h);
        
        return (x >= rx && x <= rx + rw && y >= ry && y <= ry + rh);
    }

    const startInteraction = (e) => {
        if (!isSelectionMode || !imgElement.src) return;
        e.preventDefault(); 
        isDrawing = true;
        startPos = getMousePos(e);
        selectionRect = { x: startPos.x, y: startPos.y, w: 0, h: 0 };
    };

    const moveInteraction = (e) => {
        if (!isDrawing) return;
        e.preventDefault();
        const currentPos = getMousePos(e);
        selectionRect.w = currentPos.x - startPos.x;
        selectionRect.h = currentPos.y - startPos.y;
        drawCanvas();
    };

    const endInteraction = (e) => {
        if (!isDrawing) return;
        isDrawing = false;
        if (Math.abs(selectionRect.w) < 10 || Math.abs(selectionRect.h) < 10) {
            selectionRect = null;
        }
        drawCanvas();
        updateCounts();
    };

    canvas.addEventListener('mousedown', startInteraction);
    canvas.addEventListener('mousemove', moveInteraction);
    canvas.addEventListener('mouseup', endInteraction);
    canvas.addEventListener('mouseout', endInteraction);
    canvas.addEventListener('touchstart', startInteraction, {passive: false});
    canvas.addEventListener('touchmove', moveInteraction, {passive: false});
    canvas.addEventListener('touchend', endInteraction);

    window.addEventListener('load', () => {
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW fail', err));
        }
    });
</script>
</body>
</html>
